<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Пользователи</title>
</head>
<body>
<h1>Список пользователей</h1>
<a href="/users/create">Добавить пользователя</a>
<table th:if="${!users.isEmpty()}">
  <thead>
  <tr>
    <th>ID</th>
    <th>Имя</th>
    <th>Email</th>
    <th>Дата рождения</th>
    <th>Возраст</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${users}">
    <td th:text="${user.id}"></td>
    <td th:text="${user.name}"></td>
    <td th:text="${user.email}"></td>
    <td th:text="${user.birth}"></td>
    <td th:text="${user.age}"></td>
    <td><a th:href="'/users/update?id=' + ${user.id}">Редактировать</a></td>
    <td><a th:href="'/users/delete?id=' + ${user.id}">Удалить</a></td>
  </tr>
  </tbody>
</table>

<p th:if="${users.isEmpty()}">Нет пользователей</p>
</body>
</html>
